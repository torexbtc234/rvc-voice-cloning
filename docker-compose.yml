version: '3.8'

services:
  rvc-backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - RUNPOD_API_KEY=dev-key-for-local-testing
    volumes:
      - ./models:/app/models
      - ./training:/app/training
      - ./logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
